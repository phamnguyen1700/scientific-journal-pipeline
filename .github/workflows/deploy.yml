name: Deploy

on:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  deploy:
    name: Deploy to EC2 with SSM
    runs-on: ubuntu-24.04

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Deploy with SSM
        id: deploy
        run: |
          set -euo pipefail

          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "${{ secrets.EC2_INSTANCE_ID }}" \
            --document-name "AWS-RunShellScript" \
            --comment "Deploy scientific-journal-pipeline from GitHub Actions" \
            --parameters 'commands=[
              "set -eu",
              "cd /opt/scientific-journal-pipeline",
              "git config --global --add safe.directory /opt/scientific-journal-pipeline",
              "git pull origin main",
              "docker compose up -d --build airflow-postgres airflow-init airflow-webserver airflow-scheduler",
              "docker compose ps airflow-postgres airflow-webserver airflow-scheduler",
              "healthy=0",
              "for i in $(seq 1 30); do",
              "  http_code=\"000\"",
              "  if http_code=$(curl -sS -o /tmp/airflow-health.json -w \"%{http_code}\" http://localhost:8080/health); then",
              "    echo \"Airflow health attempt $i/30: http_code=$http_code\"",
              "    cat /tmp/airflow-health.json || true",
              "    echo",
              "    if [ \"$http_code\" = \"200\" ]; then healthy=1; break; fi",
              "  else",
              "    curl_exit=$?",
              "    echo \"Airflow health attempt $i/30: curl_exit=$curl_exit http_code=$http_code\"",
              "  fi",
              "  echo \"Waiting for Airflow webserver health check... attempt $i/30\"",
              "  sleep 5",
              "done",
              "if [ \"$healthy\" != \"1\" ]; then",
              "  echo \"Airflow webserver health check failed\"",
              "  docker compose logs --tail=100 airflow-webserver",
              "  exit 1",
              "fi",
              "echo \"Airflow webserver is healthy.\"",
              "echo \"Deploy completed successfully.\""
            ]' \
            --query "Command.CommandId" \
            --output text)

          echo "command_id=$COMMAND_ID" >> "$GITHUB_OUTPUT"
          echo "SSM command id: $COMMAND_ID"

      - name: Wait for SSM deploy result
        run: |
          set -euo pipefail

          COMMAND_ID="${{ steps.deploy.outputs.command_id }}"
          INSTANCE_ID="${{ secrets.EC2_INSTANCE_ID }}"

          for i in $(seq 1 60); do
            STATUS=$(aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id "$INSTANCE_ID" \
              --query "Status" \
              --output text)

            echo "SSM deploy status attempt $i/60: $STATUS"

            if [ "$STATUS" = "Success" ]; then
              aws ssm get-command-invocation \
                --command-id "$COMMAND_ID" \
                --instance-id "$INSTANCE_ID" \
                --query "StandardOutputContent" \
                --output text
              exit 0
            fi

            if [ "$STATUS" = "Failed" ] || [ "$STATUS" = "Cancelled" ] || [ "$STATUS" = "TimedOut" ]; then
              echo "SSM deploy failed with status: $STATUS"
              echo "----- STDOUT -----"
              aws ssm get-command-invocation \
                --command-id "$COMMAND_ID" \
                --instance-id "$INSTANCE_ID" \
                --query "StandardOutputContent" \
                --output text || true
              echo "----- STDERR -----"
              aws ssm get-command-invocation \
                --command-id "$COMMAND_ID" \
                --instance-id "$INSTANCE_ID" \
                --query "StandardErrorContent" \
                --output text || true
              exit 1
            fi

            sleep 10
          done

          echo "Timed out waiting for SSM deploy command."
          exit 1
