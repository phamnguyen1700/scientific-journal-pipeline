name: Deploy

on:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-24.04

    steps:
      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/ec2_key
          chmod 600 ~/.ssh/ec2_key
          ssh-keyscan -p "${{ secrets.EC2_PORT }}" -H "${{ secrets.EC2_HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy over SSH
        run: |
          ssh -i ~/.ssh/ec2_key -p "${{ secrets.EC2_PORT }}" "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}" 'bash -s' << 'EOF'
            set -euo pipefail

            cd /opt/scientific-journal-pipeline
            git pull origin main

            docker compose up -d --build airflow-postgres airflow-init airflow-webserver airflow-scheduler
            docker compose ps airflow-postgres airflow-webserver airflow-scheduler

            healthy=0

            for i in $(seq 1 30); do
              http_code="000"

              if http_code=$(curl -sS -o /tmp/airflow-health.json -w "%{http_code}" http://localhost:8080/health); then
                echo "Airflow health attempt $i/30: http_code=$http_code"
                cat /tmp/airflow-health.json || true
                echo

                if [ "$http_code" = "200" ]; then
                  healthy=1
                  break
                fi
              else
                curl_exit=$?
                echo "Airflow health attempt $i/30: curl_exit=$curl_exit http_code=$http_code"
              fi

              echo "Waiting for Airflow webserver health check... attempt $i/30"
              sleep 5
            done

            if [ "$healthy" != "1" ]; then
              echo "Airflow webserver health check failed"
              docker compose logs --tail=100 airflow-webserver
              exit 1
            fi

            echo "Airflow webserver is healthy."
            echo "Deploy completed successfully."
          EOF
