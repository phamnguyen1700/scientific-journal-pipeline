services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: scientific-journal-sqlserver
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "${MSSQL_SA_PASSWORD}"
      MSSQL_PID: "Developer"
    ports:
      - "1433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
    restart: unless-stopped

  pipeline:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: scientific-journal-pipeline
    env_file:
      - .env
    depends_on:
      - sqlserver
    profiles:
      - pipeline

volumes:
  sqlserver_data:
