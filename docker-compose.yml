services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: scientific-journal-sqlserver
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "${MSSQL_SA_PASSWORD}"
      MSSQL_PID: "Developer"
    ports:
      - "1433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
    restart: unless-stopped

  pipeline:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: scientific-journal-pipeline
    env_file:
      - .env
    depends_on:
      - sqlserver
    extra_hosts:
      - "host.docker.internal:host-gateway"
    profiles:
      - pipeline

  airflow-postgres:
    image: postgres:16
    container_name: scientific-journal-airflow-postgres
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - airflow_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 10s
      retries: 5
      start_period: 5s
    restart: unless-stopped
    profiles:
      - airflow

  airflow-init:
    build:
      context: .
      dockerfile: airflow/Dockerfile
    container_name: scientific-journal-airflow-init
    env_file:
      - .env
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow-postgres/airflow
      AIRFLOW__WEBSERVER__SECRET_KEY: "${AIRFLOW_WEBSERVER_SECRET_KEY}"
      _AIRFLOW_DB_MIGRATE: "true"
      _AIRFLOW_WWW_USER_CREATE: "true"
      _AIRFLOW_WWW_USER_USERNAME: "${AIRFLOW_ADMIN_USERNAME}"
      _AIRFLOW_WWW_USER_PASSWORD: "${AIRFLOW_ADMIN_PASSWORD}"
      _AIRFLOW_WWW_USER_EMAIL: "${AIRFLOW_ADMIN_EMAIL}"
      _AIRFLOW_WWW_USER_FIRSTNAME: Data
      _AIRFLOW_WWW_USER_LASTNAME: Ops
    user: "${AIRFLOW_UID}:0"
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/logs:/opt/airflow/logs
      - ./airflow/plugins:/opt/airflow/plugins
    depends_on:
      airflow-postgres:
        condition: service_healthy
    entrypoint: /bin/bash
    command:
      - -c
      - airflow db migrate && (airflow users create --role Admin --username "$$AIRFLOW_ADMIN_USERNAME" --password "$$AIRFLOW_ADMIN_PASSWORD" --firstname Data --lastname Ops --email "$$AIRFLOW_ADMIN_EMAIL" || true)
    profiles:
      - airflow

  airflow-webserver:
    build:
      context: .
      dockerfile: airflow/Dockerfile
    container_name: scientific-journal-airflow-webserver
    command: webserver
    env_file:
      - .env
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow-postgres/airflow
      AIRFLOW__WEBSERVER__SECRET_KEY: "${AIRFLOW_WEBSERVER_SECRET_KEY}"
    user: "${AIRFLOW_UID}:0"
    ports:
      - "8080:8080"
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/logs:/opt/airflow/logs
      - ./airflow/plugins:/opt/airflow/plugins
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      airflow-postgres:
        condition: service_healthy
    restart: unless-stopped
    profiles:
      - airflow

  airflow-scheduler:
    build:
      context: .
      dockerfile: airflow/Dockerfile
    container_name: scientific-journal-airflow-scheduler
    command: scheduler
    env_file:
      - .env
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow-postgres/airflow
      AIRFLOW__WEBSERVER__SECRET_KEY: "${AIRFLOW_WEBSERVER_SECRET_KEY}"
    user: "${AIRFLOW_UID}:0"
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/logs:/opt/airflow/logs
      - ./airflow/plugins:/opt/airflow/plugins
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      airflow-postgres:
        condition: service_healthy
    restart: unless-stopped
    profiles:
      - airflow

volumes:
  sqlserver_data:
  airflow_postgres_data:
